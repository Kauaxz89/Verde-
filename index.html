<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verde+ · Gerenciador de Horta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
 <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
          <path d="M20 36C20 36 8 29 8 17C8 10 13 5 20 5C27 5 32 10 32 17C32 29 20 36 20 36Z" fill="#E4ECE0" />
          <path d="M20 32C20 32 11 26.5 11 17.5C11 12.5 14.8 8.5 20 8.5" stroke="#3F6B4A" stroke-width="2"
            stroke-linecap="round" />
          <path d="M20 8.5C25.2 8.5 29 12.5 29 17.5C29 26.5 20 32 20 32" stroke="#3F6B4A" stroke-width="2"
            stroke-linecap="round" />
          <circle cx="20" cy="17" r="2.6" fill="#C9A876" />
        </svg>
        <div class="brand-name">Verde<span class="plus">+</span></div>
      </div>
      <p class="auth-tagline">Cada horta é pessoal. Entre ou crie sua conta.</p>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="tab-login" onclick="switchAuthMode('login')">Entrar</button>
        <button type="button" class="auth-tab" id="tab-signup" onclick="switchAuthMode('signup')">Criar conta</button>
      </div>

      <form id="auth-form" onsubmit="return handleAuthSubmit(event)">
        <div class="field hidden" id="field-name">
          <label>Nome</label>
          <input type="text" id="auth-name" autocomplete="name" placeholder="Seu nome">
        </div>
        <div class="field hidden" id="field-email">
          <label>Email</label>
          <input type="email" id="auth-email" autocomplete="email" placeholder="voce@email.com">
        </div>
        <div class="field" id="field-identifier">
          <label>Email ou nome</label>
          <input type="text" id="auth-identifier" autocomplete="username" placeholder="voce@email.com ou seu nome">
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="auth-password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <div class="auth-error" id="auth-error"></div>
        <button type="submit" class="btn btn-primary auth-submit" id="auth-submit-btn">Entrar</button>
      </form>
      <p class="auth-note">Senha protegida com hash + salt. Os dados ficam salvos neste navegador/dispositivo — não é um sistema de autenticação de nível empresarial.</p>
    </div>
  </div>

  <div class="topbar" id="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
          <path d="M20 36C20 36 8 29 8 17C8 10 13 5 20 5C27 5 32 10 32 17C32 29 20 36 20 36Z" fill="#E4ECE0" />
          <path d="M20 32C20 32 11 26.5 11 17.5C11 12.5 14.8 8.5 20 8.5" stroke="#3F6B4A" stroke-width="2"
            stroke-linecap="round" />
          <path d="M20 8.5C25.2 8.5 29 12.5 29 17.5C29 26.5 20 32 20 32" stroke="#3F6B4A" stroke-width="2"
            stroke-linecap="round" />
          <circle cx="20" cy="17" r="2.6" fill="#C9A876" />
        </svg>
        <div class="brand-name">Verde<span class="plus">+</span></div>
      </div>
      <div class="nav" id="nav"></div>
      <div class="topbar-actions">
        <button class="new-plant-btn" onclick="openPlantForm()">+ Nova planta</button>
        <button class="account-btn" id="account-btn" onclick="toggleAccountMenu()" title="Conta"></button>
      </div>
    </div>
  </div>

  <div class="app" id="app">
    <div class="boot">carregando sua horta…</div>
  </div>

  <div id="modal-root"></div>
  <div id="quick-pop-root"></div>
  <button class="fab" id="fab-btn" title="Ação rápida" onclick="toggleQuickPop()">⚡</button>
  <div class="toast" id="toast"></div>
  <div id="print-report"></div>

  <script src="script.js"></script>
</body>

</html>
